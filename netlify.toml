[functions]
  directory = "netlify/functions"

# Weekly invoice check — Mondays at 9am CT (14:00 UTC)
[functions."invoice-check"]
  schedule = "0 14 * * 1"

# Daily Roo tool monitor — 2am CT (07:00 UTC) pings every external
# tool URL from _tool-registry.json and files bugs on failure.
[functions."roo-monitor"]
  schedule = "0 7 * * *"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "https://aidedeq.com/*"
  to = "https://aidedeq.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.aidedeq.com/*"
  to = "https://aidedeq.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
