[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "https://aidedeq.com/*"
  to = "https://aidedeq.org/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.aidedeq.com/*"
  to = "https://aidedeq.org/:splat"
  status = 301
  force = true
