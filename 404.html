<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost in Practice | AIdedEQ</title>
  <meta name="description" content="This page doesn't exist, but the work is happening nearby.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #f9f8f5;
      --foreground: #1a1a2e;
      --primary: #1a1a4e;
      --accent: #c5a880;
      --accent-light: #e8d5b7;
      --muted-foreground: #6b6560;
      --font-body: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      --font-serif: 'Lora', Georgia, 'Times New Roman', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .illustration {
      width: 100%;
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }

    .illustration svg {
      width: 100%;
      height: auto;
    }

    .four-oh-four {
      font-family: var(--font-serif);
      font-size: 5rem;
      font-weight: 600;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    h1 {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--foreground);
      margin-bottom: 0.75rem;
      font-style: italic;
    }

    p {
      font-size: 1.05rem;
      color: var(--muted-foreground);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-home {
      display: inline-block;
      padding: 0.85rem 2rem;
      background: var(--primary);
      color: var(--background);
      text-decoration: none;
      border-radius: 0.5rem;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-home:hover {
      background: #2a2a6e;
      transform: translateY(-1px);
    }

    .btn-home:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .four-oh-four { font-size: 3.5rem; }
      h1 { font-size: 1.3rem; }
      p { font-size: 0.95rem; }
      .illustration { max-width: 300px; margin-bottom: 2rem; }
    }
  </style>
</head>
